name: Swift Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.0.app

    - name: Build App
      run: |
        xcodebuild build -scheme Calculator -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15'