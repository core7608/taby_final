<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0c14;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a8bff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d6bff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60b4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a8bff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedRect">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Subtle background glow -->
  <circle cx="256" cy="220" r="180" fill="rgba(42,139,255,0.06)"/>

  <!-- Browser chrome shape - outer ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="rgba(42,139,255,0.15)" stroke-width="2"/>

  <!-- Globe/browser sphere -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="rgba(42,139,255,0.08)" stroke-width="1.5"/>

  <!-- Tab bar representation - top of browser -->
  <rect x="80" y="130" width="352" height="44" rx="10" fill="rgba(42,139,255,0.12)" stroke="rgba(42,139,255,0.2)" stroke-width="1.5"/>

  <!-- Tabs on tab bar -->
  <rect x="92" y="138" width="100" height="28" rx="6" fill="url(#blueGrad)" opacity="0.9"/>
  <rect x="200" y="140" width="80" height="24" rx="5" fill="rgba(255,255,255,0.07)"/>
  <rect x="288" y="140" width="80" height="24" rx="5" fill="rgba(255,255,255,0.05)"/>
  <!-- Tab add button -->
  <circle cx="388" cy="152" r="9" fill="rgba(255,255,255,0.08)"/>
  <line x1="384" y1="152" x2="392" y2="152" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="388" y1="148" x2="388" y2="156" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- URL bar -->
  <rect x="80" y="186" width="352" height="34" rx="17" fill="rgba(255,255,255,0.06)" stroke="rgba(42,139,255,0.25)" stroke-width="1.5"/>
  <!-- Lock icon in url bar -->
  <rect x="96" y="198" width="7" height="6" rx="1.5" fill="rgba(22,163,74,0.8)"/>
  <rect x="97.5" y="200" width="4" height="5" rx="1" fill="rgba(22,163,74,0.3)"/>
  <!-- URL bar dots -->
  <rect x="112" y="200" width="60" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
  <rect x="178" y="200" width="40" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
  <!-- Star bookmark -->
  <text x="408" y="208" font-size="12" fill="rgba(245,158,11,0.8)" font-family="sans-serif">★</text>

  <!-- Main T letter - the hero element -->
  <g filter="url(#glow)">
    <!-- T crossbar -->
    <rect x="138" y="242" width="236" height="38" rx="19" fill="url(#blueGrad)"/>
    <!-- T stem -->
    <rect x="237" y="242" width="38" height="130" rx="19" fill="url(#blueGrad)"/>
  </g>

  <!-- T highlight/shine -->
  <rect x="138" y="242" width="236" height="16" rx="19" fill="rgba(255,255,255,0.15)"/>
  <rect x="237" y="242" width="38" height="50" rx="0" fill="rgba(255,255,255,0.08)"/>

  <!-- Small accent dots - browser status indicators -->
  <circle cx="96" cy="366" r="5" fill="rgba(22,163,74,0.8)"/>
  <circle cx="112" cy="366" r="5" fill="rgba(42,139,255,0.8)"/>
  <circle cx="128" cy="366" r="5" fill="rgba(139,92,246,0.8)"/>

  <!-- Bottom bar decoration -->
  <rect x="80" y="356" width="352" height="26" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Speed lines - subtle -->
  <line x1="320" y1="362" x2="380" y2="362" stroke="rgba(42,139,255,0.2)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="330" y1="368" x2="390" y2="368" stroke="rgba(42,139,255,0.12)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Corner shine effect -->
  <path d="M 112 512 Q 80 512 80 480 L 80 420 Q 140 480 112 512 Z" fill="rgba(255,255,255,0.02)"/>
  <path d="M 400 80 Q 432 80 432 112 L 432 172 Q 372 112 400 80 Z" fill="rgba(255,255,255,0.03)"/>
</svg>
