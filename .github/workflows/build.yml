name: Build Taby Browser

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

permissions:
  contents: write

jobs:

  # ── Desktop: Windows + macOS + Linux ─────────────────────────────────────
  build-desktop:
    name: Desktop (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev librsvg2-dev patchelf \
            libssl-dev libgtk-3-dev libglib2.0-dev \
            libayatana-appindicator3-dev

      - run: npm install

      # tauri-action@v0 — الوحيد الموجود فعلاً على GitHub
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Taby Browser ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # ── Android ──────────────────────────────────────────────────────────────
  build-android:
    name: Android
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: android-actions/setup-android@v3

      # NDK 28+ مطلوب لـ Google Play (16KB page alignment)
      - name: Install NDK 28
        run: sdkmanager "ndk;28.0.12433566"

      - run: npm install

      - name: Init Android project
        run: npx tauri android init

      - name: Build Android APK
        run: npx tauri android build --debug -- --no-default-features
        env:
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/28.0.12433566

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: taby-android
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

  # ── iOS ──────────────────────────────────────────────────────────────────
  build-ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: npm install

      - name: Init iOS project
        run: npx tauri ios init

      - name: Build iOS
        # aarch64-sim = الاسم المختصر للـ tauri CLI (مش aarch64-apple-ios-sim)
        run: npx tauri ios build --target aarch64-sim -- --no-default-features
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: taby-ios
          path: src-tauri/gen/apple/build/**/*.ipa
          if-no-files-found: warn
